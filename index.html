<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pinterest Clone</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* This prevents the pins from splitting across the masonry columns */
        .pin-container {
            break-inside: avoid;
        }
    </style>
</head>
<body class="bg-white min-h-screen">

    <nav class="flex items-center px-4 py-3 space-x-4 w-full bg-white sticky top-0 z-50 shadow-sm">
        <div class="p-3 bg-red-600 text-white rounded-full font-bold cursor-pointer hover:bg-red-700 transition">
            <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M12.017 0C5.396 0 .029 5.367.029 11.987c0 5.079 3.158 9.417 7.618 11.162-.105-.949-.199-2.403.041-3.439.219-.937 1.406-5.957 1.406-5.957s-.359-.72-.359-1.781c0-1.663.967-2.911 2.168-2.911 1.024 0 1.518.769 1.518 1.688 0 1.029-.653 2.567-.992 3.992-.285 1.193.6 2.165 1.775 2.165 2.128 0 3.768-2.245 3.768-5.487 0-2.861-2.063-4.869-5.008-4.869-3.41 0-5.409 2.562-5.409 5.199 0 1.033.394 2.143.889 2.741.099.12.112.225.085.345-.09.375-.293 1.199-.334 1.363-.053.225-.172.271-.401.165-1.495-.69-2.433-2.878-2.433-4.646 0-3.776 2.748-7.252 7.951-7.252 4.163 0 7.392 2.967 7.392 6.923 0 4.135-2.607 7.462-6.233 7.462-1.214 0-2.354-.629-2.758-1.379l-.749 2.848c-.269 1.045-1.004 2.352-1.498 3.146 1.123.345 2.306.535 3.55.535 6.607 0 11.985-5.365 11.985-11.987C23.97 5.367 18.602 0 12.017 0z"/></svg>
        </div>
        <button class="px-4 py-2 bg-black text-white rounded-full font-semibold hidden sm:block">Home</button>
        <button class="px-4 py-2 hover:bg-gray-100 rounded-full font-semibold hidden sm:block text-gray-800">Create</button>
        
        <div class="flex-grow flex items-center bg-gray-100 rounded-full px-4 py-3 hover:bg-gray-200 transition">
            <svg class="w-5 h-5 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
            <input type="text" placeholder="Search" class="bg-transparent outline-none w-full ml-2 text-gray-700" />
        </div>
        
        <div class="flex space-x-3">
            <div class="w-10 h-10 bg-gray-200 rounded-full flex items-center justify-center cursor-pointer hover:bg-gray-300">
                <span class="font-bold text-gray-600">Z</span>
            </div>
        </div>
    </nav>

    <main class="px-4 py-8 max-w-screen-2xl mx-auto">
        <div id="grid" class="columns-2 md:columns-3 lg:columns-4 xl:columns-5 gap-4 space-y-4">
            </div>
    </main>

    <script>
        // Data for our pins
        const pins = [
            { title: "FLS2N Short Film Concepts", height: "h-96", img: "https://images.unsplash.com/photo-1485846234645-a62644f84728?w=500&q=80" },
            { title: "Canon 800D Viewfinder Setup", height: "h-64", img: "https://images.unsplash.com/photo-1516724562728-afc824a36e84?w=500&q=80" },
            { title: "Traditional Tari Saman Photography", height: "h-80", img: "https://images.unsplash.com/photo-1541018596041-38933b49e1e5?w=500&q=80" },
            { title: "Android Manifest.xml Editing", height: "h-48", img: "https://images.unsplash.com/photo-1607252656733-fd7458c5c7ce?w=500&q=80" },
            { title: "Tie Dye Color Palette Inspiration", height: "h-96", img: "https://images.unsplash.com/photo-1603513364968-35ea6f642646?w=500&q=80" },
            { title: "Shotgun Mic Audio Mixing", height: "h-64", img: "https://images.unsplash.com/photo-1598488035139-bdbb2231ce04?w=500&q=80" },
            { title: "Lighting Setups for Filmmaking", height: "h-80", img: "https://images.unsplash.com/photo-1590201389825-78e7c10b42c6?w=500&q=80" },
            { title: "Rule of Thirds Masterclass", height: "h-48", img: "https://images.unsplash.com/photo-1516961642265-531546e84af2?w=500&q=80" },
            { title: "Cinematic Color Grading", height: "h-96", img: "https://images.unsplash.com/photo-1536240478700-b869070f9279?w=500&q=80" },
            { title: "Storyboard Templates", height: "h-64", img: "https://images.unsplash.com/photo-1455309014342-96b6f58be337?w=500&q=80" }
        ];

        const gridContainer = document.getElementById('grid');

        // Loop through the data and build the HTML for each pin
        pins.forEach(pin => {
            const pinHTML = `
                <div class="pin-container relative group mb-4 cursor-pointer">
                    <div class="w-full ${pin.height} rounded-2xl overflow-hidden">
                        <img src="${pin.img}" alt="${pin.title}" class="w-full h-full object-cover transition duration-300 group-hover:brightness-75" />
                    </div>
                    
                    <div class="absolute inset-0 opacity-0 group-hover:opacity-100 flex flex-col justify-between p-4 transition duration-300">
                        <div class="flex justify-end">
                            <button class="bg-red-600 text-white font-bold px-4 py-2 rounded-full hover:bg-red-700 transition">Save</button>
                        </div>
                        <div class="flex justify-between items-center w-full">
                            <div class="bg-white/80 backdrop-blur-sm rounded-full p-2 hover:bg-white text-black transition">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path></svg>
                            </div>
                            <div class="bg-white/80 backdrop-blur-sm rounded-full p-2 hover:bg-white text-black transition">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 12h.01M12 12h.01M19 12h.01M6 12a1 1 0 11-2 0 1 1 0 012 0zm7 0a1 1 0 11-2 0 1 1 0 012 0zm7 0a1 1 0 11-2 0 1 1 0 012 0z"></path></svg>
                            </div>
                        </div>
                    </div>
                    <h3 class="mt-2 text-sm font-semibold text-gray-800 px-1 truncate">${pin.title}</h3>
                </div>
            `;
            // Insert the built HTML into the grid
            gridContainer.insertAdjacentHTML('beforeend', pinHTML);
        });
    </script>
</body>
</html>
